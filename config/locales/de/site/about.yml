de:
  site:
    about:
      title: "Über FemMed"
      subtitle: "Medikamenten-Tracking, von Femboys für Femboys"
      data_heading: "🔒 Deine Daten, dein Server"
      data_body: "Wir wollen deine Daten nicht. Im Ernst. FemMed ist selbst gehostet, was bedeutet, dass alles, was du dokumentierst — deine Dosen, deine Medikamente, deine Geschichte — auf deinem Gerät liegt, nicht bei uns. Keine Accounts bei Fremden, keine von Anwälten verfassten Datenschutzrichtlinien, keine Dritten, die still von deinen Gesundheitsdaten profitieren."
      does_heading: "💊 Was es macht"
      does_body: "FemMed ermöglicht es dir, deine Rezepte zu verwalten und Dosen zu protokollieren, sobald du sie einnimmst. Es gibt eine Zeitstrahlansicht zum Überblicken deines Tages, und alles ist auf schnelle Bedienung ausgelegt — eine Dosis zu protokollieren sollte Sekunden dauern, nicht Minuten."
      built_heading: "🛠 Technologien"
      built_body: "FemMed ist eine Rails 8-Anwendung mit SQLite, Tailwind CSS, Hotwire und Stimulus. Sie ist darauf ausgelegt, in einem einzigen Docker-Container ohne externe Abhängigkeiten zu laufen — kein Redis, kein Postgres, kein Aufwand. Wenn du Docker betreiben kannst, kannst du FemMed betreiben."
      thanks_heading: "💗 Danksagungen"
