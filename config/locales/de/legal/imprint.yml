        Zustimmung des jeweiligen Autors. Downloads und Kopien dieser Seite sind nur für den
        privaten, nicht kommerziellen Gebrauch gestattet.
      s7_heading: "7. Online-Streitbeilegung"
      s7_body_html: >-
        Die Europäische Kommission stellt eine Plattform zur Online-Streitbeilegung (OS) bereit,
        die Sie unter <a href="https://ec.europa.eu/consumers/odr" class="underline">ec.europa.eu/consumers/odr</a>
