      s2_heading: "2. Art des Dienstes"
      s2_body: >-
        FemMed ist ein privat betriebener Medikamentenverfolgungsdienst. Er ist kein Medizinprodukt,
        erteilt keine medizinischen Ratschläge und ersetzt nicht die Konsultation einer qualifizierten
        medizinischen Fachkraft. Der Dienst wird ausschließlich für persönliche Organisationszwecke
        bereitgestellt.
      s3_heading: "3. Aufsichtsbehörde & anwendbares Recht"
      s3_body: >-
        FemMed wird von einer Privatperson betrieben und unterliegt keiner spezifischen
        Aufsichtsbehörde oder Berufszulassungspflicht. Der Dienst unterliegt österreichischem Recht.
        In Datenschutzangelegenheiten ist die zuständige Aufsichtsbehörde:
      s3_authority_name: "Datenschutzbehörde (DSB)"
      s3_authority_address: "Barichgasse 40–42, 1030 Wien, Österreich"
      s4_heading: "4. Haftung für Inhalte"
      s4_body: >-
        Die Inhalte dieser Website wurden mit größtmöglicher Sorgfalt erstellt. Wir können jedoch
        keine Gewähr für die Richtigkeit, Vollständigkeit oder Aktualität der bereitgestellten
        Informationen übernehmen. Als privater Diensteanbieter sind wir gemäß allgemeinem Recht
        (§ 7 ECG) für eigene Inhalte auf diesen Seiten verantwortlich. Wir sind nicht verpflichtet,
        übermittelte oder gespeicherte fremde Informationen zu überwachen oder nach Umständen zu
        forschen, die auf eine rechtswidrige Tätigkeit hinweisen.
      s5_heading: "5. Haftung für Links"
      s5_body: >-
        Diese Website kann Links zu externen Webseiten Dritter enthalten. Auf deren Inhalte haben
        wir keinen Einfluss und können daher keine Gewähr für diese Inhalte übernehmen. Für die
        Inhalte der verlinkten Seiten ist stets der jeweilige Anbieter oder Betreiber der Seite
        verantwortlich. Die verlinkten Seiten wurden zum Zeitpunkt der Verlinkung auf mögliche
        Rechtsverstöße überprüft, und es wurden keine rechtswidrigen Inhalte festgestellt. Eine
        dauernde inhaltliche Kontrolle der verlinkten Seiten ist ohne konkrete Anhaltspunkte einer
        Rechtsverletzung nicht zumutbar. Sollten uns Rechtsverletzungen bekannt werden, werden wir
        derartige Links umgehend entfernen.
      s6_heading: "6. Urheberrecht"
      s6_body: >-
        Die durch den Seitenbetreiber erstellten Inhalte und Werke auf dieser Website unterliegen
        dem österreichischen Urheberrecht. Die Vervielfältigung, Bearbeitung, Verbreitung und jede
