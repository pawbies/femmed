de:
  legal:
    privacy:
      title: "Datenschutzerklärung"
      last_updated: "Zuletzt aktualisiert: 16. März 2026"
      s1_heading: "1. Einleitung"
      s1_body1: >-
        Willkommen bei FemMed. Wir sind dem Schutz Ihrer personenbezogenen Daten und der Wahrung
        Ihrer Privatsphäre verpflichtet. Diese Datenschutzerklärung erläutert, wie FemMed
        Informationen über Sie erhebt, verwendet, speichert und schützt, wenn Sie unseren
        Medikamentenverwaltungsdienst nutzen.
      s1_body2: >-
        FemMed wird von einem einzelnen Verantwortlichen mit Sitz in Österreich betrieben und
        unterliegt der Datenschutz-Grundverordnung (EU) 2016/679 („DSGVO") sowie dem österreichischen
        Datenschutzgesetz (DSG). Da wir international tätig sind, respektieren wir auch die
        anwendbaren Datenschutzgesetze der Länder, in denen unsere Nutzer ansässig sind.
      s2_heading: "2. Verantwortlicher & Kontakt"
      s2_body: "Der für Ihre personenbezogenen Daten Verantwortliche ist:"
      s2_contact_note: >-
        Wenn Sie Fragen, Bedenken oder Anfragen zu dieser Datenschutzerklärung oder Ihren
        personenbezogenen Daten haben, wenden Sie sich bitte über die oben genannte E-Mail-Adresse
        an uns.
      s3_heading: "3. Mindestalter"
      s3_body: >-
        FemMed richtet sich an Nutzer, die mindestens 16 Jahre alt sind, in Übereinstimmung mit
        österreichischem Recht und Artikel 8 der DSGVO in der in Österreich umgesetzten Fassung.
        Wir erheben wissentlich keine personenbezogenen Daten von Personen unter 16 Jahren. Sollten
        wir feststellen, dass Daten von einer Person unter diesem Alter erhoben wurden, werden wir
        diese unverzüglich löschen.
      s4_heading: "4. Von uns erhobene personenbezogene Daten"
      s4_intro: "Wir erheben nur die Daten, die zur Erbringung des FemMed-Dienstes erforderlich sind."
      s4_1_heading: "4.1 Kontodaten"
      s4_1_username_label: "Benutzername"
      s4_1_username_desc: "— verschlüsselt gespeichert"
      s4_1_email_label: "E-Mail-Adresse"
      s4_1_email_desc: "— verschlüsselt gespeichert"
      s4_1_password_label: "Passwort"
      s4_1_password_desc: "— als Einweg-Kryptographie-Hash gespeichert; wir können Ihr ursprüngliches Passwort nicht wiederherstellen"
      s4_2_heading: "4.2 Medikamenten- & Gesundheitsdaten"
      s4_2_intro: "FemMed verarbeitet Daten über die Medikamente, die Sie in der Anwendung verfolgen. Dazu gehören:"
      s4_2_item1: "Medikamente, die Sie mit Ihrem Konto verknüpft haben"
      s4_2_item2: "Dosierungsinformationen und Zeitpunkte der eingenommenen Dosen"
      s4_2_item3: "Notizen, die Sie Medikamenteneinträgen hinzufügen können"
      s4_2_body_html: >-
        Diese Daten werden als Gesundheitsdaten gemäß <span class="font-medium">Artikel 9 DSGVO</span>
        (besondere Kategorie von Daten) eingestuft und genießen den höchsten rechtlichen Schutz.
        Sie werden im Klartext in unserer Datenbank gespeichert. Wir wenden derzeit keine
        Feldverschlüsselung für Gesundheitsdaten an, über die in Abschnitt 8 beschriebenen
        Zugriffskontrollen und Sicherheitsmaßnahmen auf Serverebene hinaus.
      s4_2_note: >-
        Wir sind transparent darüber und prüfen weiterhin zusätzliche technische Schutzmaßnahmen
        für zukünftige Versionen von FemMed.
      s4_3_heading: "4.3 Daten, die wir nicht erheben"
      s4_3_body: >-
        Wir erheben keine Zahlungsinformationen, amtliche Ausweisdokumente, Standortdaten,
        Gerätekennungen oder Verhaltensanalyse- und Tracking-Daten.
      s5_heading: "5. Rechtsgrundlage der Verarbeitung"
      s5_intro: "Wir verarbeiten Ihre personenbezogenen Daten auf folgenden Rechtsgrundlagen gemäß DSGVO:"
      s5_item1_label: "Vertragserfüllung (Art. 6 Abs. 1 lit. b DSGVO):"
      s5_item1: "Die Verarbeitung Ihrer Kontodaten ist erforderlich, um Ihr FemMed-Konto zu erstellen und zu verwalten."
      s5_item2_label: "Ausdrückliche Einwilligung (Art. 6 Abs. 1 lit. a und Art. 9 Abs. 2 lit. a DSGVO):"
      s5_item2: >-
        Durch die Erstellung eines Kontos und die Eingabe Ihrer Medikamenteninformationen erteilen
        Sie eine ausdrückliche Einwilligung zur Verarbeitung Ihrer gesundheitsbezogenen Daten. Sie
        können diese Einwilligung jederzeit durch Löschen Ihres Kontos widerrufen.
      s5_item3_label: "Rechtliche Verpflichtung (Art. 6 Abs. 1 lit. c DSGVO):"
      s5_item3: >-
        Wir können Ihre Daten verarbeiten, wenn dies zur Erfüllung einer rechtlichen Verpflichtung
        nach österreichischem oder EU-Recht erforderlich ist.
      s6_heading: "6. Verwendung Ihrer Daten"
      s6_intro: "Wir verwenden Ihre personenbezogenen Daten ausschließlich für folgende Zwecke:"
      s6_item1: "Zur Erstellung, Pflege und Sicherung Ihres FemMed-Kontos"
      s6_item2: "Um Ihnen die Verfolgung und Verwaltung Ihrer Medikamente und Einnahmepläne zu ermöglichen"
      s6_item3: "Zur Übermittlung dienstbezogener Mitteilungen (z. B. E-Mails zum Zurücksetzen des Passworts)"
      s6_item4: "Zur Erfüllung rechtlicher Verpflichtungen, denen wir als Verantwortlicher unterliegen"
      s6_footer: "Wir verwenden Ihre Daten nicht für Werbung, Profiling oder automatisierte Entscheidungsfindung."
      s7_heading: "7. Datenweitergabe & Offenlegung"
      s7_intro: "Wir verkaufen, vermieten oder teilen Ihre personenbezogenen Daten zu keinem Zeitpunkt mit Dritten zu kommerziellen Zwecken."
      s7_1_heading: "7.1 Hosting-Anbieter"
      s7_1_body: >-
        Ihre Daten werden auf der Infrastruktur der Hetzner Online GmbH gespeichert, die innerhalb
        der EU/des EWR tätig ist. Unsere Server befinden sich in Finnland. Hetzner fungiert in unserem
        Auftrag als Auftragsverarbeiter und ist vertraglich im Rahmen einer DSGVO-konformen
        Auftragsverarbeitungsvereinbarung (AVV) gebunden. Hetzner hat keinen Zugriff auf Ihre Daten
        für andere Zwecke als die Infrastrukturbereitstellung.
      s7_2_heading: "7.2 Gesetzliche Anforderungen"
      s7_2_body: >-
        Wir können personenbezogene Daten offenlegen, wenn wir dazu durch geltendes Recht, eine
        Verordnung oder eine gerichtliche Anordnung einer zuständigen österreichischen oder
        EU-Behörde verpflichtet sind. Wir werden Sie über solche Anfragen informieren, soweit uns
        dies rechtlich erlaubt ist.
      s7_3_heading: "7.3 Keine weitere Weitergabe"
      s7_3_body: >-
        Keine anderen Dritten erhalten Ihre personenbezogenen Daten. Wir verwenden keine
        Analysedienste, Werbenetzwerke oder sonstige Auftragsverarbeiter über die oben
        beschriebenen hinaus.
      s8_heading: "8. Datensicherheit"
      s8_intro: >-
        Wir nehmen die Sicherheit Ihrer Daten ernst und haben folgende technische und
        organisatorische Maßnahmen umgesetzt:
      s8_item1: "Verschlüsselung personenbezogener Kontodaten (Benutzername und E-Mail-Adresse) im Ruhezustand"
      s8_item2: "Einweg-Hashing von Passwörtern — Ihr ursprüngliches Passwort wird nie gespeichert oder zugänglich gemacht"
      s8_item3: "Datenspeicherung ausschließlich innerhalb der EU/des EWR auf Hetzner-Infrastruktur"
      s8_item4: "Zugriff auf die Produktionsdatenbank ausschließlich für autorisiertes Personal"
      s8_footer: >-
        Obwohl wir intensiv daran arbeiten, Ihre Daten zu schützen, ist keine Methode der
        Übertragung über das Internet oder der elektronischen Speicherung zu 100 % sicher. Wir
        empfehlen Ihnen, ein starkes, einzigartiges Passwort für Ihr FemMed-Konto zu verwenden.
      s9_heading: "9. Datenspeicherung"
      s9_body: >-
        Wir speichern Ihre personenbezogenen Daten, solange Ihr Konto aktiv ist. Wenn Sie Ihr
        Konto löschen, werden wir alle damit verbundenen personenbezogenen Daten innerhalb von
        30 Tagen dauerhaft aus unseren Systemen entfernen, außer wenn wir bestimmte Daten zur
        Erfüllung rechtlicher Verpflichtungen länger aufbewahren müssen.
      s10_heading: "10. Ihre Rechte gemäß DSGVO"
      s10_intro: >-
        Als betroffene Person gemäß DSGVO haben Sie folgende Rechte in Bezug auf Ihre
        personenbezogenen Daten:
      s10_item1_label: "Auskunftsrecht (Art. 15):"
      s10_item1: "Fordern Sie eine Kopie der bei uns gespeicherten personenbezogenen Daten an."
      s10_item2_label: "Recht auf Berichtigung (Art. 16):"
      s10_item2: "Fordern Sie die Korrektur unrichtiger oder unvollständiger Daten an."
      s10_item3_label: "Recht auf Löschung (Art. 17):"
      s10_item3: 'Fordern Sie die Löschung Ihrer personenbezogenen Daten an („Recht auf Vergessenwerden"), vorbehaltlich bestimmter gesetzlicher Ausnahmen.'
      s10_item4_label: "Recht auf Einschränkung der Verarbeitung (Art. 18):"
      s10_item4: "Fordern Sie unter bestimmten Umständen die Einschränkung der Verarbeitung Ihrer Daten an."
      s10_item5_label: "Recht auf Datenübertragbarkeit (Art. 20):"
      s10_item5: "Erhalten Sie Ihre personenbezogenen Daten in einem strukturierten, maschinenlesbaren Format."
      s10_item6_label: "Recht auf Widerruf der Einwilligung (Art. 7 Abs. 3):"
      s10_item6: "Widerrufen Sie Ihre Einwilligung jederzeit, ohne die Rechtmäßigkeit der bisherigen Verarbeitung zu beeinträchtigen."
      s10_item7_html: >-
        <span class="font-medium">Recht auf Beschwerde (Art. 77):</span> Reichen Sie eine Beschwerde
        bei der österreichischen Datenschutzbehörde (DSB) ein unter
        <a href="https://www.dsb.gv.at" class="underline">dsb.gv.at</a>.
      s10_contact_html: >-
        Um eines dieser Rechte auszuüben, kontaktieren Sie uns unter
        <a href="mailto:contact@pawbies.net" class="underline">contact@pawbies.net</a>.
        Wir werden innerhalb von 30 Tagen gemäß DSGVO antworten.
      s11_heading: "11. Internationale Datenübertragungen"
      s11_body: >-
        Ihre Daten werden ausschließlich innerhalb der EU/des EWR gespeichert und verarbeitet und
        nicht in Länder außerhalb des EWR übertragen. Sollte sich dies in Zukunft ändern, werden
        wir diese Datenschutzerklärung aktualisieren und sicherstellen, dass geeignete Schutzmaßnahmen
        (wie Standardvertragsklauseln) vor einer solchen Übertragung getroffen werden.
      s12_heading: "12. Gesundheitsdaten (besondere Kategorie)"
      s12_intro: >-
        Medikamenteninformationen stellen Gesundheitsdaten dar und werden gemäß Art. 9 DSGVO als
        besondere Kategorie personenbezogener Daten eingestuft, die einem erhöhten Rechtsschutz
        unterliegen. Wir verarbeiten diese Daten nur:
      s12_item1: "Auf Grundlage Ihrer ausdrücklichen Einwilligung, die bei der Kontoerstellung und Nutzung des Dienstes erteilt wurde"
      s12_item2: "Zum alleinigen Zweck der Bereitstellung der von Ihnen angeforderten Medikamentenverfolgungsfunktion"
      s12_footer: >-
        Sie können Ihre Einwilligung jederzeit widerrufen und die Löschung aller Gesundheitsdaten
        beantragen, indem Sie uns kontaktieren oder Ihr Konto löschen.
      s13_heading: "13. Cookies & Tracking"
      s13_body: >-
        FemMed verwendet keine Tracking-Cookies von Drittanbietern oder Analysedienste. Wir können
        strikt notwendige Sitzungscookies oder Token verwenden, die für die Authentifizierung und
        den sicheren Betrieb des Dienstes erforderlich sind. Diese werden nicht für Werbe- oder
        Profiling-Zwecke verwendet.
      s14_heading: "14. Änderungen dieser Erklärung"
      s14_body: >-
        Wir können diese Datenschutzerklärung von Zeit zu Zeit aktualisieren, um Änderungen unserer
        Praktiken oder gesetzlichen Anforderungen zu berücksichtigen. Bei wesentlichen Änderungen
        werden wir Sie per E-Mail und/oder durch einen auffälligen Hinweis in der Anwendung
        informieren. Das Datum am Anfang dieses Dokuments zeigt an, wann es zuletzt aktualisiert wurde.
      s15_heading: "15. Kontakt & Beschwerden"
      s15_intro: >-
        Bei Fragen oder Bedenken zu dieser Datenschutzerklärung oder zu unserem Umgang mit Ihren
        personenbezogenen Daten wenden Sie sich bitte an:
      s15_complaint_intro: >-
        Wenn Sie mit unserer Antwort nicht zufrieden sind, haben Sie das Recht, eine Beschwerde
        bei der österreichischen Datenschutzbehörde einzureichen:
      s15_dsb_name: "Datenschutzbehörde (DSB)"
      s15_dsb_address: "Barichgasse 40–42, 1030 Wien, Österreich"
      s15_note: >-
        Diese Datenschutzerklärung wurde in Übereinstimmung mit der Datenschutz-Grundverordnung
        (EU) 2016/679 (DSGVO) und dem österreichischen Datenschutzgesetz (DSG) erstellt.
