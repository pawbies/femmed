ja:
  site:
    about:
      title: "FemMedについて"
      subtitle: "フェムボーイによるフェムボーイのための服薬管理"
      data_heading: "🔒 あなたのデータ、あなたのサーバー"
      data_body: "私たちはあなたのデータを必要としません。本当に。FemMedはセルフホスト型なので、記録したすべてのもの（服用量、薬、履歴）はあなたのマシンに保存され、私たちのサーバーには置かれません。見知らぬ人へのアカウント登録も、弁護士が書いたプライバシーポリシーも、あなたの健康情報で密かに利益を得る第三者も存在しません。"
      does_heading: "💊 できること"
      does_body: "FemMedでは、処方を管理し、服用のたびに用量を記録できます。1日を振り返るためのタイムラインビューがあり、すべてが素早く使えるように設計されています。用量の記録は数秒でできます。"
      built_heading: "🛠 使用技術"
      built_body: "FemMedはRails 8アプリケーションで、SQLite、Tailwind CSS、Hotwire、Stimulusを使用しています。外部依存関係なしに単一のDockerコンテナで動作するように設計されています。RedisもPostgresも不要です。Dockerが動かせれば、FemMedも動かせます。"
      thanks_heading: "💗 謝辞"
