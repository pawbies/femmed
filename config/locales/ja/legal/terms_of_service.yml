ja:
  legal:
    terms_of_service:
      title: "利用規約"
      last_updated: "最終更新日：2026年3月16日"
      s1_heading: "1. 利用規約への同意"
      s1_body: >-
        アカウントを作成するかFemMedを使用することにより、この利用規約に拘束されることに同意したものと
        みなします。これらの条件に同意しない場合は、サービスを使用しないでください。当社はいつでも
        これらの条件を更新する権利を留保します — 変更が掲載された後もFemMedを継続して使用することは、
        改訂された条件への同意とみなされます。
      s2_heading: "2. FemMedについて"
      s2_body1: >-
        FemMedは無料の個人運営の服薬管理サービスです。ユーザーが個人の服薬スケジュールを整理・
        管理するのを支援するために設計されています。
      s2_body2_html: >-
        FemMedは<span class="font-medium">医療サービスではありません</span>。いかなる医療アドバイス、
        診断、または治療推奨も提供しません。アプリケーション内のいかなる内容も、専門的な医療アドバイスの
        代替として解釈すべきではありません。薬や健康に関する決定をする前に、必ず資格のある医療専門家に
        相談してください。
      s3_heading: "3. 利用資格"
      s3_body: >-
        オーストリア法に従い、FemMedを使用するには少なくとも16歳以上である必要があります。アカウントを
        作成することにより、この要件を満たしていることを確認します。この条件が満たされていないと
        信じる理由がある場合、アカウントを停止または削除する権利を留保します。
      s4_heading: "4. アカウント"
      s4_body1: >-
        ログイン認証情報の機密性の維持と、アカウント下で発生するすべての活動に対してお客様が
        責任を負います。強力な固有パスワードを使用し、アカウントを他者と共有しないでください。
      s4_contact_html: >-
        アカウントへの不正アクセスが疑われる場合は、直ちに
        <a href="mailto:contact@pawbies.net" class="underline">contact@pawbies.net</a>
        までご連絡ください。
      s4_deletion_before: >-
        アプリケーション内からいつでもアカウントを削除できます。削除後、アカウントに関連するすべての
        個人データは、当社の
      s4_deletion_link: "プライバシーポリシー"
      s5_heading: "5. ユーザー投稿コンテンツ"
      s5_intro: "FemMedはデータベースにない独自の薬を投稿することを許可しています。コンテンツを投稿することにより、以下を確認します："
      s5_item1: "提供する情報は最善の知識に基づいて正確である"
      s5_item2: "虚偽、誤解を招く、または有害なコンテンツを投稿しない"
      s5_item3: "第三者の知的財産権を侵害しない"
      s5_footer: >-
        ユーザー投稿の薬のエントリーの正確性は確認せず、お客様が提供するコンテンツの誤りや
        不備について責任を負いません。アプリケーションに入力する情報についてはお客様のみが
        責任を負います。
      s6_heading: "6. 利用規則"
      s6_intro: "FemMedを本来の目的のためにのみ、すべての適用法を遵守して使用することに同意します。以下を行ってはなりません："
      s6_item1: "サービスまたはそのインフラへの不正アクセスを試みること"
      s6_item2: "違法、有害、または詐欺的なコンテンツを保存または送信するためにサービスを使用すること"
      s6_item3: "アプリケーションのソースコードを取得しようとしてリバースエンジニアリングまたはデコンパイルすること"
      s6_item4: "自動スクリプト、ボット、またはスクレイパーを使用してサービスと対話すること"
      s6_item5: "他のユーザーのサービスパフォーマンスを妨害または低下させようとすること"
      s6_footer: >-
        これらの条件に違反するアカウントを予告なしに停止または永久に解約する権利を留保します。
      s7_heading: "7. サービスの可用性"
      s7_body: >-
        FemMedは無料で「現状のまま」「利用可能な状態で」提供されます。稼働時間、可用性、または
        サービスへの中断のないアクセスについて保証しません。予告の有無にかかわらず、いつでもサービスを
        停止、変更、または廃止することがあり、それによる損失や不便について責任を負いません。
      s8_heading: "8. 保証の免責"
      s8_intro: >-
        オーストリアおよび適用EU法が認める最大限の範囲で、FemMedは明示または黙示を問わず、
        いかなる種類の保証もなく提供されます。以下を保証しません：
      s8_item1: "サービスがお客様の特定の要件を満たすこと"
      s8_item2: "サービスがエラーなし、安全、または継続的に利用可能であること"
      s8_item3: "アプリケーション内の薬のデータが完全、最新、または正確であること"
      s8_footer: "サービスの利用はお客様自身の責任において行われます。"
      s9_heading: "9. 責任の制限"
      s9_body: >-
        法律が認める最大限の範囲で、Max Mustermann（FemMedの運営者）は、サービスの使用または
        使用不能から生じる直接的、間接的、偶発的、結果的、または特別な損害 — アプリケーション内の
        情報に基づく健康関連の決定、データ損失、またはサービス中断を含むがこれらに限定されない —
        について責任を負いません。
      s9_footer: >-
        これらの条件のいかなる内容も、重大な過失、故意の違法行為、またはオーストリアの消費者
        保護法の下で除外できない責任を制限するものではありません。
      s10_heading: "10. 知的財産"
      s10_body1: >-
        FemMedを構成するすべてのオリジナルコンテンツ、デザイン、コードはMax Mustermann の知的財産であり、
        オーストリア著作権法の下で保護されています。事前の書面による許可なしに、サービスのいかなる
        部分も複製、配布、または派生作品を作成することはできません。
      s10_body2: >-
        薬の名称、製造業者情報、およびその他の参照データは公共データベースまたはサードパーティの
        ソースから提供される場合があり、それぞれのライセンスおよび所有権に従います。
      s11_heading: "11. プライバシー"
      s11_before_link: "FemMedのご利用には当社の"
      s11_privacy_link: "プライバシーポリシー"
      s11_after_link: "も適用され、参照によりこの利用規約に組み込まれます。FemMedを使用することで、そこに記載されたデータの収集と使用に同意したものとみなします。"
      s12_heading: "12. 準拠法・裁判管轄"
      s12_body1: >-
        この利用規約は、法の抵触原則に関わらず、オーストリア共和国の法律に準拠します。この利用規約
        またはFemMedのご利用から生じるすべての紛争は、オーストリアの権限ある裁判所の専属管轄に
        服します。
      s12_body2: >-
        他のEU加盟国に居住する消費者の場合、居住国の強制的な消費者保護規定を援用する権利を
        保持します。
      s13_heading: "13. 利用規約の変更"
      s13_body: >-
        この利用規約は随時更新される場合があります。重要な変更を行う場合は、メールおよび/または
        アプリケーション内の目立つ通知でお知らせします。このページの冒頭の日付が利用規約の最終
        更新日を示します。変更が発効した後もFemMedを継続して使用することは、改訂された条件への
        同意とみなされます。
      s14_heading: "14. お問い合わせ"
      s14_body: "この利用規約についてご質問がある場合は、以下までご連絡ください："
      s14_note: >-
        この利用規約は、電子商取引法（ECG）、消費者保護法（KSchG）、および適用されるEU消費者
        保護指令を含むオーストリア法に従って作成されました。
