ja:
  legal:
    imprint:
      title: "運営情報"
      subtitle: "§ 5 ECG（電子商取引法）および § 25 MedienG（メディア法）に基づく情報提供義務"
      last_updated: "最終更新日：2026年3月16日"
      s1_heading: "1. 運営者・連絡先"
      s1_name_label: "氏名："
      s1_email_label: "メール："
      s2_heading: "2. サービスの性質"
      s2_body: >-
        FemMedは個人が運営する服薬管理サービスです。医療機器ではなく、医療アドバイスを提供するものでもなく、
        資格のある医療専門家への相談に代わるものでもありません。本サービスは個人的な管理目的のみに
        提供されています。
      s3_heading: "3. 規制当局・適用法"
      s3_body: >-
        FemMedは個人によって運営されており、特定の規制当局や専門ライセンス要件の対象ではありません。
        本サービスはオーストリア法に準拠します。データ保護に関しては、管轄監督機関は以下のとおりです：
      s3_authority_name: "データ保護局（Datenschutzbehörde, DSB）"
      s3_authority_address: "Barichgasse 40–42, 1030 ウィーン, オーストリア"
      s4_heading: "4. コンテンツの免責"
      s4_body: >-
        本ウェブサイトのコンテンツは最大限の注意を払って作成されています。ただし、提供される情報の
        正確性、完全性、または適時性について保証することはできません。個人サービス提供者として、一般法
        （§ 7 ECG）に従い、これらのページの自社コンテンツに対して責任を負います。送信または保存された
        第三者情報を監視する義務、または違法行為を示す状況を調査する義務はありません。
      s5_heading: "5. リンクの免責"
      s5_body: >-
        本ウェブサイトには外部の第三者ウェブサイトへのリンクが含まれる場合があります。それらのサイトの
        コンテンツに対して影響を与えることはできないため、責任を負いません。リンクされたページのコンテンツ
        については、そのページのそれぞれの提供者または運営者が常に責任を負います。リンク時には可能な
        法的違反についてリンクされたページを確認しており、違法なコンテンツは確認されませんでした。
        違反の具体的な証拠なしに、リンクされたページの継続的な監視は合理的ではありません。法的侵害が
        判明した場合、直ちにそのようなリンクを削除します。
      s6_heading: "6. 著作権"
      s6_body: >-
        本ウェブサイトのサイト運営者が作成したコンテンツおよび作品はオーストリア著作権法の対象です。
        著作権法の範囲を超えた複製、処理、配布、またはいかなる形での商業利用も、著者の事前の書面による
        同意が必要です。本サイトのダウンロードおよびコピーは、私的、非商業的用途のみに許可されています。
      s7_heading: "7. オンライン紛争解決"
      s7_body_html: >-
        欧州委員会はオンライン紛争解決（ODR）のためのプラットフォームを提供しており、
        <a href="https://ec.europa.eu/consumers/odr" class="underline">ec.europa.eu/consumers/odr</a>
        でアクセスできます。消費者仲裁機関での紛争解決手続きへの参加は義務付けられておらず、
        自発的にも参加しません。
