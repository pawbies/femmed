ja:
  legal:
    privacy:
      title: "プライバシーポリシー"
      last_updated: "最終更新日：2026年3月16日"
      s1_heading: "1. はじめに"
      s1_body1: >-
        FemMedへようこそ。私たちはお客様の個人データの保護とプライバシーの尊重に取り組んでいます。
        このプライバシーポリシーでは、FemMedが服薬管理サービスのご利用時に、お客様に関する情報を
        どのように収集、使用、保存、保護するかを説明します。
      s1_body2: >-
        FemMedはオーストリアを拠点とする個人の管理者によって運営されており、一般データ保護規則
        （EU）2016/679（「GDPR」）およびオーストリアデータ保護法（Datenschutzgesetz, DSG）の
        対象となります。国際的に運営しているため、ユーザーが所在する国の適用されるデータ保護法も
        尊重しています。
      s2_heading: "2. 管理者・連絡先"
      s2_body: "お客様の個人データの責任ある管理者は以下のとおりです："
      s2_contact_note: >-
        このプライバシーポリシーまたはお客様の個人データに関するご質問、懸念、またはご要望がある
        場合は、上記のメールアドレスまでお問い合わせください。
      s3_heading: "3. 最低年齢"
      s3_body: >-
        FemMedは、オーストリア法およびオーストリアで施行されたGDPR第8条に従い、16歳以上のユーザーを
        対象としています。16歳未満の方から個人データを意図的に収集することはありません。16歳未満の
        方からデータが収集されたことが判明した場合、速やかに削除します。
      s4_heading: "4. 収集する個人データ"
      s4_intro: "FemMedサービスの提供に必要なデータのみを収集します。"
      s4_1_heading: "4.1 アカウントデータ"
      s4_1_username_label: "ユーザー名"
      s4_1_username_desc: "— 暗号化して保存"
      s4_1_email_label: "メールアドレス"
      s4_1_email_desc: "— 暗号化して保存"
      s4_1_password_label: "パスワード"
      s4_1_password_desc: "— 一方向の暗号化ハッシュとして保存。元のパスワードを復元することはできません"
      s4_2_heading: "4.2 服薬・健康データ"
      s4_2_intro: "FemMedはアプリケーション内で追跡している薬に関するデータを処理します。これには以下が含まれます："
      s4_2_item1: "アカウントに紐付けた薬"
      s4_2_item2: "用量情報および服薬のタイミング"
      s4_2_item3: "薬のエントリーに添付したメモ"
      s4_2_body_html: >-
        このデータは<span class="font-medium">GDPR第9条</span>に基づく健康データ（特別カテゴリーの
        データ）として分類され、最高レベルの法的保護を受けます。データはデータベースに平文で保存されます。
        現在、第8条に記載されているアクセス制御およびサーバーレベルのセキュリティ対策を超えた
        フィールドレベルの暗号化は適用していません。
      s4_2_note: >-
        この点については透明性を持って開示しており、FemMedの将来のバージョンに向けた追加の技術的
        保護措置を引き続き検討しています。
      s4_3_heading: "4.3 収集しないデータ"
      s4_3_body: >-
        支払い情報、公的身分証明書、位置データ、デバイス識別子、行動分析やトラッキングデータは
        収集しません。
      s5_heading: "5. 処理の法的根拠"
      s5_intro: "GDPRに基づき、以下の法的根拠でお客様の個人データを処理します："
      s5_item1_label: "契約の履行（GDPR第6条第1項(b)）："
      s5_item1: "FemMedアカウントの作成・管理に必要なため、アカウントデータを処理します。"
      s5_item2_label: "明示的な同意（GDPR第6条第1項(a)および第9条第2項(a)）："
      s5_item2: >-
        アカウントを作成し服薬情報を入力することにより、健康関連データの処理に対する明示的な同意を
        いただきます。この同意はアカウントを削除することでいつでも撤回できます。
      s5_item3_label: "法的義務（GDPR第6条第1項(c)）："
      s5_item3: >-
        オーストリアまたはEU法上の法的義務の遵守に必要な場合、お客様のデータを処理することがあります。
      s6_heading: "6. データの利用方法"
      s6_intro: "個人データは以下の目的のみに使用します："
      s6_item1: "FemMedアカウントの作成、維持、保護のため"
      s6_item2: "薬と服用スケジュールの追跡・管理を可能にするため"
      s6_item3: "サービス関連の通知の送信（例：パスワードリセットメール）のため"
      s6_item4: "管理者として従う法的義務の遵守のため"
      s6_footer: "広告、プロファイリング、または自動化された意思決定にデータを使用することはありません。"
      s7_heading: "7. データの共有・開示"
      s7_intro: "商業目的で第三者に個人データを販売・貸与・共有することは一切ありません。"
      s7_1_heading: "7.1 ホスティングプロバイダー"
      s7_1_body: >-
        お客様のデータはEU/EEA内で運営されるHetzner Online GmbHのインフラに保存されています。
        サーバーはフィンランドに設置されています。HetznerはGDPR要件に準拠したデータ処理契約（DPA）
        の下で当社の委託先として契約に拘束されています。Hetznerはインフラ提供以外の目的でお客様の
        データにアクセスすることはありません。
      s7_2_heading: "7.2 法的要件"
      s7_2_body: >-
        適用法、規制、またはオーストリアもしくはEUの権限ある当局による裁判所命令によって要求される
        場合、個人データを開示することがあります。法的に許可されている場合には、そのような要求について
        お知らせします。
      s7_3_heading: "7.3 その他の共有なし"
      s7_3_body: >-
        上記以外の第三者がお客様の個人データを受け取ることはありません。上記以外の分析サービス、
        広告ネットワーク、またはその他のデータ処理業者は使用していません。
      s8_heading: "8. データセキュリティ"
      s8_intro: "お客様のデータのセキュリティを真剣に捉え、以下の技術的・組織的対策を実施しています："
      s8_item1: "ユーザー名とメールアドレスなどの個人識別アカウントデータの保存時の暗号化"
      s8_item2: "パスワードの一方向ハッシュ化 — 元のパスワードは保存・アクセス不可"
      s8_item3: "Hetznerインフラ上のEU/EEA内限定でのデータホスティング"
      s8_item4: "本番データベースへのアクセスを認可された担当者のみに制限"
      s8_footer: >-
        お客様のデータ保護に努めていますが、インターネット経由の送信や電子的保存において100%安全な
        方法はありません。FemMedアカウントには強力な固有パスワードをご使用ください。
      s9_heading: "9. データ保存期間"
      s9_body: >-
        アカウントが有効な間、個人データを保持します。アカウントを削除した場合、法的義務を遵守する
        ために一定のデータをより長期間保持する必要がある場合を除き、関連するすべての個人データを
        30日以内にシステムから永久に削除します。
      s10_heading: "10. GDPRに基づくお客様の権利"
      s10_intro: "GDPRに基づくデータ主体として、お客様は個人データに関して以下の権利を有します："
      s10_item1_label: "アクセス権（第15条）："
      s10_item1: "当社が保有するお客様の個人データのコピーを請求できます。"
      s10_item2_label: "訂正権（第16条）："
      s10_item2: "不正確または不完全なデータの訂正を請求できます。"
      s10_item3_label: "削除権（第17条）："
      s10_item3: "一定の法的例外を条件に、個人データの削除（「忘れられる権利」）を請求できます。"
      s10_item4_label: "処理制限権（第18条）："
      s10_item4: "特定の状況下でデータ処理の制限を請求できます。"
      s10_item5_label: "データポータビリティ権（第20条）："
      s10_item5: "構造化された機械可読形式で個人データを受け取ることができます。"
      s10_item6_label: "同意撤回権（第7条第3項）："
      s10_item6: "過去の処理の適法性に影響を与えることなく、いつでも同意を撤回できます。"
      s10_item7_html: >-
        <span class="font-medium">苦情申立権（第77条）：</span>オーストリアデータ保護局
        （Datenschutzbehörde, DSB）に苦情を申し立てることができます
        <a href="https://www.dsb.gv.at" class="underline">dsb.gv.at</a>。
      s10_contact_html: >-
        これらの権利を行使するには、<a href="mailto:contact@pawbies.net" class="underline">contact@pawbies.net</a>
        までお問い合わせください。GDPRの要件に従い、30日以内に対応します。
      s11_heading: "11. 国際的なデータ移転"
      s11_body: >-
        お客様のデータはEU/EEA内でのみ保存・処理され、EEA外の国には移転しません。将来これが変わる
        場合は、このプライバシーポリシーを更新し、移転前に適切な保護措置（標準契約条項など）を
        確保します。
      s12_heading: "12. 健康データ（特別カテゴリーのデータ）"
      s12_intro: >-
        服薬情報は健康データを構成し、GDPR第9条に基づく特別カテゴリーの個人データとして分類され、
        強化された法的保護を受けます。このデータを処理するのは以下の場合のみです：
      s12_item1: "アカウント作成およびサービス利用時にいただいた明示的な同意に基づく場合"
      s12_item2: "お客様が要求した服薬管理機能の提供という唯一の目的のため"
      s12_footer: >-
        お問い合わせいただくか、アカウントを削除することにより、いつでも同意を撤回し、すべての
        健康データの削除を請求できます。
      s13_heading: "13. クッキーとトラッキング"
      s13_body: >-
        FemMedはサードパーティのトラッキングクッキーや分析サービスを使用しません。認証およびサービスの
        安全な運用に必要なセッションクッキーまたはトークンのみを使用する場合があります。これらは
        広告やプロファイリング目的には使用されません。
      s14_heading: "14. ポリシーの変更"
      s14_body: >-
        このプライバシーポリシーは、当社の慣行または法的要件の変更を反映するために随時更新される
        場合があります。重要な変更を行う場合は、メールおよび/またはアプリケーション内の目立つ
        通知でお知らせします。本文書の冒頭の日付が最終更新日を示します。
      s15_heading: "15. 連絡先・苦情"
      s15_intro: >-
        このプライバシーポリシーまたは個人データの取り扱いについてご質問や懸念がある場合は、
        以下までご連絡ください：
      s15_complaint_intro: >-
        当社の対応にご満足いただけない場合は、オーストリアデータ保護局に苦情を申し立てる権利が
        あります：
      s15_dsb_name: "データ保護局（Datenschutzbehörde, DSB）"
      s15_dsb_address: "Barichgasse 40–42, 1030 ウィーン, オーストリア"
      s15_note: >-
        このプライバシーポリシーは、一般データ保護規則（EU）2016/679（GDPR）およびオーストリア
        データ保護法（DSG）に従って作成されました。
