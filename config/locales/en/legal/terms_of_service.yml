      s6_item2: "Use the service to store or transmit unlawful, harmful, or fraudulent content"
      s6_item3: "Reverse engineer, decompile, or otherwise attempt to extract the source code of the application"
      s6_item4: "Use automated scripts, bots, or scrapers to interact with the service"
      s6_item5: "Attempt to disrupt or degrade the performance of the service for other users"
      s6_footer: >-
        We reserve the right to suspend or permanently terminate accounts that violate these
        conditions, without prior notice.
      s7_heading: "7. Availability of the Service"
      s7_body: >-
        FemMed is provided free of charge and on an "as is" and "as available" basis. We make no
        guarantees regarding uptime, availability, or uninterrupted access to the service. We may
        suspend, modify, or discontinue the service at any time, with or without notice, and accept
