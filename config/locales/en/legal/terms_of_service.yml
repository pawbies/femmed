    terms_of_service:
      title: "Terms of Service"
      last_updated: "Last updated: 16. March 2026"
      s1_heading: "1. Acceptance of Terms"
      s1_body: >-
        By creating an account or using FemMed, you agree to be bound by these Terms of Service.
        If you do not agree to these terms, please do not use the service. We reserve the right to
        update these terms at any time — continued use of FemMed after changes are posted
        constitutes acceptance of the revised terms.
      s2_heading: "2. About FemMed"
      s2_body1: >-
        FemMed is a free, privately operated medication tracking service. It is designed to help
        users organise and monitor their personal medication schedules.
      s2_body2_html: >-
        FemMed is <span class="font-medium">not a medical service</span>. It does not provide
        medical advice, diagnosis, or treatment recommendations of any kind. Nothing within the
        application should be interpreted as a substitute for professional medical advice. Always
        consult a qualified healthcare professional before making decisions about your medication
        or health.
      s3_heading: "3. Eligibility"
      s3_body: >-
        You must be at least 16 years old to use FemMed, in accordance with Austrian law. By
        creating an account, you confirm that you meet this requirement. We reserve the right to
        suspend or delete accounts where we have reason to believe this condition is not met.
      s4_heading: "4. Your Account"
      s4_body1: >-
        You are responsible for maintaining the confidentiality of your login credentials and for
        all activity that occurs under your account. Please use a strong, unique password and do
        not share your account with others.
      s4_contact_html: >-
        If you suspect unauthorised access to your account, please contact us immediately at
        <a href="mailto:contact@pawbies.net" class="underline">contact@pawbies.net</a>.
      s4_deletion_before: >-
        You may delete your account at any time from within the application. Upon deletion, all
        personal data associated with your account will be permanently removed from our systems
        within 30 days, in accordance with our
      s4_deletion_link: "Privacy Policy"
      s5_heading: "5. User-Submitted Content"
      s5_intro: "FemMed allows you to submit custom medications that are not found in our database. By submitting content, you confirm that:"
      s5_item1: "The information you provide is accurate to the best of your knowledge"
      s5_item2: "You are not submitting content that is false, misleading, or harmful"
      s5_item3: "You are not infringing on any third-party intellectual property rights"
      s5_footer: >-
        We do not verify the accuracy of user-submitted medication entries and accept no liability
        for errors or omissions in content you provide. You remain solely responsible for the
        information you enter into the application.
      s6_heading: "6. Acceptable Use"
      s6_intro: "You agree to use FemMed only for its intended purpose and in compliance with all applicable laws. You must not:"
