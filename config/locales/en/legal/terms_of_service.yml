      s11_heading: "11. Privacy"
      s11_before_link: "Your use of FemMed is also governed by our"
      s11_privacy_link: "Privacy Policy"
      s11_after_link: ", which is incorporated into these Terms of Service by reference. By using FemMed, you agree to the collection and use of your data as described therein."
