      s8_item2: "The service will be error-free, secure, or continuously available"
      s8_item3: "Any medication data within the application is complete, current, or accurate"
      s8_footer: "Use of the service is entirely at your own risk."
      s9_heading: "9. Limitation of Liability"
      s9_body: >-
