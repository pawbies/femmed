en:
  legal:
    privacy:
      title: "Privacy Policy"
      last_updated: "Last updated: 16. March 2026"
      s1_heading: "1. Introduction"
      s1_body1: >-
        Welcome to FemMed. We are committed to protecting your personal data and respecting your
        privacy. This Privacy Policy explains how FemMed collects, uses, stores, and protects
        information about you when you use our medication tracking service.
      s1_body2: >-
        FemMed is operated by an individual data controller based in Austria and is subject to the
        General Data Protection Regulation (EU) 2016/679 ("GDPR") and the Austrian Data Protection
        Act (Datenschutzgesetz, DSG). As we operate internationally, we also respect applicable data
        protection laws in the countries where our users are located.
      s2_heading: "2. Data Controller & Contact"
      s2_body: "The data controller responsible for your personal data is:"
      s2_contact_note: >-
        If you have any questions, concerns, or requests relating to this Privacy Policy or your
        personal data, please contact us at the email address above.
      s3_heading: "3. Minimum Age"
      s3_body: >-
        FemMed is intended for users who are at least 16 years old, in accordance with Austrian law
        and Article 8 of the GDPR as implemented in Austria. We do not knowingly collect personal
        data from individuals under 16 years of age. If we become aware that data has been collected
        from a person under this age, we will delete it promptly.
      s4_heading: "4. Personal Data We Collect"
      s4_intro: "We collect only the data that is necessary to provide the FemMed service."
      s4_1_heading: "4.1 Account Data"
      s4_1_username_label: "Username"
      s4_1_username_desc: "— stored in encrypted form"
      s4_1_email_label: "Email address"
      s4_1_email_desc: "— stored in encrypted form"
      s4_1_password_label: "Password"
      s4_1_password_desc: "— stored as a one-way cryptographic hash; we cannot recover your original password"
      s4_2_heading: "4.2 Medication & Health Data"
      s4_2_intro: "FemMed processes data about the medications you track within the application. This includes:"
      s4_2_item1: "Medications you have linked to your account"
      s4_2_item2: "Dosage information and timing of doses taken"
      s4_2_item3: "Notes you may attach to medication entries"
      s4_2_body_html: >-
        This data is classified as health data under <span class="font-medium">Article 9 GDPR</span>
        (special category data) and is afforded the highest level of legal protection. It is stored
        in clear text in our database. We do not currently apply field-level encryption to health data
        beyond the access controls and server-level security measures described in Section 8.
      s4_2_note: >-
        We are transparent about this and continue to evaluate additional technical safeguards for
        future versions of FemMed.
      s4_3_heading: "4.3 Data We Do Not Collect"
      s4_3_body: >-
        We do not collect payment information, government identification, location data, device
        identifiers, or any behavioural analytics or tracking data.
      s5_heading: "5. Legal Basis for Processing"
      s5_intro: "We process your personal data on the following legal bases under GDPR:"
      s5_item1_label: "Contract performance (Article 6(1)(b) GDPR):"
      s5_item1: "Processing your account data is necessary to create and manage your FemMed account."
      s5_item2_label: "Explicit consent (Article 6(1)(a) and Article 9(2)(a) GDPR):"
      s5_item2: >-
        By creating an account and entering your medication information, you give explicit consent
        to the processing of your health-related data. You may withdraw this consent at any time
        by deleting your account.
      s5_item3_label: "Legal obligation (Article 6(1)(c) GDPR):"
      s5_item3: >-
        We may process your data where required to comply with a legal obligation under Austrian
        or EU law.
      s6_heading: "6. How We Use Your Data"
      s6_intro: "We use your personal data solely for the following purposes:"
      s6_item1: "To create, maintain, and secure your FemMed account"
      s6_item2: "To enable you to track and manage your medications and dosing schedules"
      s6_item3: "To send you service-related communications (e.g. password reset emails)"
      s6_item4: "To comply with legal obligations we are subject to as a data controller"
      s6_footer: "We do not use your data for advertising, profiling, or automated decision-making."
      s7_heading: "7. Data Sharing & Disclosure"
      s7_intro: "We do not sell, rent, or share your personal data with any third parties for commercial purposes — ever."
      s7_1_heading: "7.1 Hosting Provider"
      s7_1_body: >-
        Your data is stored on infrastructure provided by Hetzner Online GmbH, which operates within
        the EU/EEA. Our servers are located in Finland. Hetzner acts as a data processor on our behalf
        and is contractually bound under a Data Processing Agreement (DPA) compliant with GDPR
        requirements. Hetzner does not have access to your data for any purpose other than
        infrastructure provision.
      s7_2_heading: "7.2 Legal Requirements"
      s7_2_body: >-
        We may disclose personal data if required to do so by applicable law, regulation, or court
        order issued by a competent Austrian or EU authority. We will notify you of such requests
        where we are legally permitted to do so.
      s7_3_heading: "7.3 No Other Sharing"
      s7_3_body: >-
        No other third parties receive your personal data. We do not use analytics services,
        advertising networks, or any other data processors beyond those described above.
      s8_heading: "8. Data Security"
      s8_intro: >-
        We take the security of your data seriously and have implemented the following technical
        and organisational measures:
      s8_item1: "Encryption of personally identifiable account data (username and email address) at rest"
      s8_item2: "One-way hashing of passwords — your original password is never stored or accessible"
      s8_item3: "Data hosted exclusively within the EU/EEA on Hetzner infrastructure"
      s8_item4: "Access to the production database restricted to authorised personnel only"
      s8_footer: >-
        Whilst we work hard to protect your data, no method of transmission over the internet or
        electronic storage is 100% secure. We encourage you to use a strong, unique password for
        your FemMed account.
      s9_heading: "9. Data Retention"
      s9_body: >-
        We retain your personal data for as long as your account is active. If you delete your
        account, we will permanently delete all associated personal data from our systems within
        30 days, except where we are required to retain certain data for a longer period to comply
        with legal obligations.
      s10_heading: "10. Your Rights Under GDPR"
      s10_intro: >-
        As a data subject under the GDPR, you have the following rights with respect to your
        personal data:
      s10_item1_label: "Right of access (Article 15):"
      s10_item1: "Request a copy of the personal data we hold about you."
      s10_item2_label: "Right to rectification (Article 16):"
      s10_item2: "Request correction of inaccurate or incomplete data."
      s10_item3_label: "Right to erasure (Article 17):"
      s10_item3: 'Request deletion of your personal data ("right to be forgotten"), subject to certain legal exceptions.'
      s10_item4_label: "Right to restriction of processing (Article 18):"
      s10_item4: "Request that we restrict how we process your data in certain circumstances."
      s10_item5_label: "Right to data portability (Article 20):"
      s10_item5: "Receive your personal data in a structured, machine-readable format."
      s10_item6_label: "Right to withdraw consent (Article 7(3)):"
      s10_item6: "Withdraw consent at any time without affecting the lawfulness of prior processing."
      s10_item7_html: >-
        <span class="font-medium">Right to lodge a complaint (Article 77):</span> Lodge a complaint
        with the Austrian Data Protection Authority (Datenschutzbehörde, DSB) at
        <a href="https://www.dsb.gv.at" class="underline">dsb.gv.at</a>.
      s10_contact_html: >-
        To exercise any of these rights, contact us at
        <a href="mailto:contact@pawbies.net" class="underline">contact@pawbies.net</a>.
        We will respond within 30 days as required by GDPR.
      s11_heading: "11. International Data Transfers"
      s11_body: >-
        Your data is stored and processed exclusively within the EU/EEA and is not transferred to
        countries outside the EEA. If this changes in the future, we will update this Privacy Policy
        and ensure appropriate safeguards (such as Standard Contractual Clauses) are in place before
        any such transfer occurs.
      s12_heading: "12. Health Data (Special Category Data)"
      s12_intro: >-
        Medication information constitutes health data and is classified as a special category of
        personal data under Article 9 GDPR, receiving heightened legal protections. We process
        this data only:
      s12_item1: "On the basis of your explicit consent given at the time of account creation and use of the service"
      s12_item2: "For the sole purpose of providing the medication tracking functionality you have requested"
      s12_footer: >-
        You may withdraw your consent and request deletion of all health data at any time by
        contacting us or deleting your account.
      s13_heading: "13. Cookies & Tracking"
      s13_body: >-
        FemMed does not use third-party tracking cookies or analytics services. We may use strictly
        necessary session cookies or tokens required for authentication and the secure operation of
        the service. These are not used for advertising or profiling purposes.
      s14_heading: "14. Changes to This Policy"
      s14_body: >-
        We may update this Privacy Policy from time to time to reflect changes in our practices or
        legal requirements. When we make material changes, we will notify you via email and/or a
        prominent notice within the application. The date at the top of this document indicates
        when it was last updated.
      s15_heading: "15. Contact & Complaints"
      s15_intro: >-
        For any questions or concerns about this Privacy Policy or the way we handle your personal
        data, please contact:
      s15_complaint_intro: >-
        If you are not satisfied with our response, you have the right to lodge a complaint with
        the Austrian Data Protection Authority:
      s15_dsb_name: "Datenschutzbehörde (DSB)"
      s15_dsb_address: "Barichgasse 40–42, 1030 Vienna, Austria"
      s15_note: >-
        This Privacy Policy was prepared in accordance with the General Data Protection Regulation
        (EU) 2016/679 (GDPR) and the Austrian Data Protection Act (DSG). It is provided in English;
        a German-language version may be provided upon request.
